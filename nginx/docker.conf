# =============================================================================
# Atlas Platform — Nginx Docker Configuration
# =============================================================================
# Adattamento di atlas.conf per ambiente Docker
# - Upstream: nome servizio Docker (backend:3000)
# - No SSL (terminazione TLS esterna via reverse proxy / load balancer)
# =============================================================================

upstream atlas_backend {
    server backend:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    # NOTA: nginx annulla gli add_header del blocco padre quando un blocco
    # figlio (location) usa add_header. Per questo i security headers vanno
    # ripetuti in ogni location che definisce i propri add_header.
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # -------------------------------------------------------------------------
    # Upload file — max 10MB
    # -------------------------------------------------------------------------
    client_max_body_size 10M;

    # -------------------------------------------------------------------------
    # Frontend Vue.js — File statici
    # -------------------------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # SPA: tutte le route non-file vanno a index.html (Vue Router history mode)
        try_files $uri $uri/ /index.html;

        # Cache per HTML: no-cache (sempre fresco per nuovi deploy)
        location ~* \.html$ {
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }
    }

    # Asset statici con hash (Vite genera file tipo app.a1b2c3.js)
    location ~* \.(js|css|woff2|woff|ttf|eot|ico|svg|png|jpg|jpeg|webp|avif|gif)$ {
        expires 1y;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker PWA — mai cachare
    location = /sw.js {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Manifest PWA
    location = /manifest.webmanifest {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-cache";
        types { application/manifest+json webmanifest; }
    }

    # -------------------------------------------------------------------------
    # API Backend — Proxy verso Node.js
    # -------------------------------------------------------------------------
    location /api {
        proxy_pass http://atlas_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # -------------------------------------------------------------------------
    # Swagger API Docs
    # -------------------------------------------------------------------------
    location /api-docs {
        proxy_pass http://atlas_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # WebSocket — Socket.io (chat real-time)
    # -------------------------------------------------------------------------
    location /socket.io {
        proxy_pass http://atlas_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -------------------------------------------------------------------------
    # File Upload serviti direttamente da nginx
    # -------------------------------------------------------------------------
    location /uploads {
        alias /app/uploads;
        expires 30d;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public";
        access_log off;

        location ~* \.(php|jsp|asp|aspx|sh|cgi)$ {
            deny all;
        }
    }

    # -------------------------------------------------------------------------
    # Blocca accesso a file sensibili
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Blocca file di backup (es. config.js~)
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
