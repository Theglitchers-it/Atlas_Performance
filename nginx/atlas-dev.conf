# =============================================================================
# Atlas Platform — Configurazione Nginx Sviluppo
# =============================================================================
# Versione semplificata senza SSL per test locale.
#
# Uso:
#   1. Copia in /etc/nginx/sites-available/atlas-dev.conf
#   2. Crea symlink: ln -s /etc/nginx/sites-available/atlas-dev.conf /etc/nginx/sites-enabled/
#   3. Modifica i percorsi con i tuoi valori
#   4. Testa: nginx -t
#   5. Ricarica: sudo systemctl reload nginx
# =============================================================================

upstream atlas_backend_dev {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost atlas.local;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Upload max 10MB
    client_max_body_size 10M;

    # Frontend — File statici
    root /var/www/atlas/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Backend
    location /api {
        proxy_pass http://atlas_backend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Swagger Docs
    location /api-docs {
        proxy_pass http://atlas_backend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket — Socket.io
    location /socket.io {
        proxy_pass http://atlas_backend_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # File Upload
    location /uploads {
        alias /var/www/atlas/backend/uploads;
        access_log off;
    }

    # Blocca file nascosti
    location ~ /\. {
        deny all;
    }

    # Log
    access_log /var/log/nginx/atlas_dev_access.log;
    error_log  /var/log/nginx/atlas_dev_error.log;
}
