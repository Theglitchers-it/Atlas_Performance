# =============================================================================
# Atlas Platform — Configurazione Nginx Produzione
# =============================================================================
# Reverse proxy per frontend Vue.js + backend Express.js + WebSocket Socket.io
#
# Uso:
#   1. Copia questo file in /etc/nginx/sites-available/atlas.conf
#   2. Crea symlink: ln -s /etc/nginx/sites-available/atlas.conf /etc/nginx/sites-enabled/
#   3. Modifica i percorsi e il dominio con i tuoi valori
#   4. Testa: nginx -t
#   5. Ricarica: sudo systemctl reload nginx
# =============================================================================

# Backend Node.js (PM2 cluster mode, porta 3000)
upstream atlas_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# =============================================================================
# HTTP → Redirect a HTTPS
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name tuodominio.com www.tuodominio.com;

    # Certbot ACME challenge (per Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tutto il traffico HTTP a HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# =============================================================================
# HTTPS — Configurazione principale
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tuodominio.com www.tuodominio.com;

    # -------------------------------------------------------------------------
    # SSL/TLS
    # -------------------------------------------------------------------------
    # Certificati Let's Encrypt (modifica i percorsi)
    ssl_certificate     /etc/letsencrypt/live/tuodominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tuodominio.com/privkey.pem;

    # Protocolli e cipher sicuri
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # -------------------------------------------------------------------------
    # Upload file — max 10MB
    # -------------------------------------------------------------------------
    client_max_body_size 10M;

    # -------------------------------------------------------------------------
    # Frontend Vue.js — File statici da frontend/dist/
    # -------------------------------------------------------------------------
    root /var/www/atlas/frontend/dist;
    index index.html;

    location / {
        # SPA: tutte le route non-file vanno a index.html (Vue Router history mode)
        try_files $uri $uri/ /index.html;

        # Cache per HTML: no-cache (sempre fresco per nuovi deploy)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }
    }

    # Asset statici con hash nel nome (Vite genera file tipo app.a1b2c3.js)
    location ~* \.(js|css|woff2|woff|ttf|eot|ico|svg|png|jpg|jpeg|webp|avif|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker PWA — mai cachare
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Manifest PWA
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { application/manifest+json webmanifest; }
    }

    # -------------------------------------------------------------------------
    # API Backend — Proxy verso Node.js
    # -------------------------------------------------------------------------
    location /api {
        proxy_pass http://atlas_backend;
        proxy_http_version 1.1;

        # Headers proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # -------------------------------------------------------------------------
    # Swagger API Docs
    # -------------------------------------------------------------------------
    location /api-docs {
        proxy_pass http://atlas_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # WebSocket — Socket.io (chat real-time)
    # -------------------------------------------------------------------------
    location /socket.io {
        proxy_pass http://atlas_backend;
        proxy_http_version 1.1;

        # Upgrade WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout lungo (connessioni persistenti)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -------------------------------------------------------------------------
    # File Upload serviti direttamente da nginx
    # -------------------------------------------------------------------------
    location /uploads {
        alias /var/www/atlas/backend/uploads;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;

        # Blocca esecuzione di script negli upload
        location ~* \.(php|jsp|asp|aspx|sh|cgi)$ {
            deny all;
        }
    }

    # -------------------------------------------------------------------------
    # Blocca accesso a file sensibili
    # -------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # -------------------------------------------------------------------------
    # Log
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/atlas_access.log;
    error_log  /var/log/nginx/atlas_error.log warn;
}
